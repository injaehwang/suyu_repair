<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket opened showing interior -->
  <path d="M30 30 L70 20 L100 18 L130 20 L170 30 L172 65 L174 165 L26 165 L28 65 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Lining area - top half only -->
  <rect x="38" y="38" width="124" height="60" rx="3" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
  <!-- Diagonal pattern for lined area -->
  <g stroke="#cbd5e1" stroke-width="0.8" opacity="0.8">
    <line x1="38" y1="50" x2="50" y2="38"/>
    <line x1="38" y1="70" x2="70" y2="38"/>
    <line x1="38" y1="90" x2="90" y2="38"/>
    <line x1="58" y1="98" x2="110" y2="38"/>
    <line x1="78" y1="98" x2="130" y2="38"/>
    <line x1="98" y1="98" x2="150" y2="38"/>
    <line x1="118" y1="98" x2="162" y2="48"/>
    <line x1="138" y1="98" x2="162" y2="68"/>
    <line x1="155" y1="98" x2="162" y2="88"/>
  </g>
  <!-- Dividing line where lining ends -->
  <line x1="38" y1="98" x2="162" y2="98" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Lower half - empty/unlined -->
  <text x="100" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">unlined</text>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Half Lining</text>
</svg>