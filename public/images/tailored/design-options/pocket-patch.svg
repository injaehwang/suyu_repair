<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket side panel hint -->
  <rect x="40" y="30" width="120" height="130" rx="4" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Patch pocket - visibly sewn-on pocket -->
  <rect x="60" y="75" width="80" height="50" rx="4" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <!-- Stitch line inside -->
  <rect x="64" y="79" width="72" height="42" rx="3" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Pocket opening -->
  <line x1="60" y1="75" x2="140" y2="75" stroke="#475569" stroke-width="2.5"/>
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Patch Pocket</text>
</svg>