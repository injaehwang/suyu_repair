<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket front upper area -->
  <path d="M55 30 L80 22 L100 20 L120 22 L145 30 L148 65 L150 165 L50 165 L52 65 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Lapels -->
  <path d="M80 22 L93 62 L78 68 L55 30" fill="none" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M120 22 L107 62 L122 68 L145 30" fill="none" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- No breast pocket - clean chest area -->
  <!-- X mark where pocket would be -->
  <g stroke="#94a3b8" stroke-width="1.5" opacity="0.5">
    <line x1="112" y1="65" x2="132" y2="80"/>
    <line x1="132" y1="65" x2="112" y2="80"/>
  </g>
  <!-- Cross/no symbol -->
  <circle cx="100" cy="130" r="15" fill="none" stroke="#475569" stroke-width="2"/>
  <line x1="89" y1="130" x2="111" y2="130" stroke="#475569" stroke-width="2.5"/>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">No Breast Pocket</text>
</svg>