<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket collar area -->
  <path d="M55 40 L80 30 L100 25 L120 30 L145 40 L148 70 L150 160 L50 160 L52 70 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Peak lapel - left: point goes UP and outward -->
  <path d="M80 30 L92 78 L70 85 L50 42 L55 40" fill="none" stroke="#475569" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M70 85 L58 55" stroke="#475569" stroke-width="2.5"/>
  <!-- Peak point left -->
  <path d="M50 42 L44 35" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Peak lapel - right -->
  <path d="M120 30 L108 78 L130 85 L150 42 L145 40" fill="none" stroke="#475569" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M130 85 L142 55" stroke="#475569" stroke-width="2.5"/>
  <!-- Peak point right -->
  <path d="M150 42 L156 35" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Peak Lapel</text>
</svg>