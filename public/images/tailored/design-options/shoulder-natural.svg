<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Torso/neck -->
  <rect x="85" y="55" width="30" height="30" rx="5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Natural shoulder - follows body slope gently -->
  <path d="M40 105 Q55 82 85 78 L85 85 Q60 88 48 105 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <path d="M160 105 Q145 82 115 78 L115 85 Q140 88 152 105 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Body -->
  <path d="M48 105 L48 160 L152 160 L152 105" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Shoulder line - gentle natural slope -->
  <path d="M40 105 Q55 82 100 78 Q145 82 160 105" fill="none" stroke="#475569" stroke-width="2.5"/>
  <!-- Gentle curve indicator -->
  <path d="M55 90 Q75 82 100 80 Q125 82 145 90" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Natural Shoulder</text>
</svg>