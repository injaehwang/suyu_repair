<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket back view -->
  <path d="M50 30 L75 22 L100 20 L125 22 L150 30 L155 70 L155 165 L45 165 L45 70 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Shoulder seams -->
  <line x1="50" y1="30" x2="75" y2="35" stroke="#475569" stroke-width="1.5"/>
  <line x1="150" y1="30" x2="125" y2="35" stroke="#475569" stroke-width="1.5"/>
  <!-- Center back seam -->
  <line x1="100" y1="30" x2="100" y2="100" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Center vent - single slit up center -->
  <line x1="100" y1="100" x2="100" y2="165" stroke="#475569" stroke-width="2"/>
  <!-- Vent overlap hints -->
  <path d="M100 100 L97 105" stroke="#475569" stroke-width="1.5"/>
  <path d="M100 100 L103 105" stroke="#475569" stroke-width="1.5"/>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Center Vent</text>
</svg>