  <path d="M80 30 Q65 50 68 70 Q70 85 92 90" fill="none" stroke="#475569" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Right shawl -->
  <path d="M120 30 Q135 50 132 70 Q130 85 108 90" fill="none" stroke="#475569" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner collar curve -->
  <path d="M80 30 Q90 38 100 40 Q110 38 120 30" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Shawl Lapel</text>
</svg>