  <path d="M120 22 L107 62 L122 68 L145 30" fill="none" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Breast pocket (left chest area) - welt style -->
  <line x1="108" y1="72" x2="135" y2="72" stroke="#475569" stroke-width="2"/>
  <!-- Pocket square/handkerchief hint -->
  <path d="M116 72 L114 60 L120 55 L126 60 L124 72" fill="#e2e8f0" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
