<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Torso/neck -->
  <rect x="85" y="55" width="30" height="30" rx="5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Structured shoulder - sharp, angular, built up -->
  <path d="M35 95 L85 80 L85 88 L43 100 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <path d="M165 95 L115 80 L115 88 L157 100 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Body -->
  <path d="M43 100 L43 160 L157 160 L157 100" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Shoulder line - very angular/sharp -->
  <path d="M35 95 L85 80 L100 78 L115 80 L165 95" fill="none" stroke="#475569" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Padding indicators -->
  <line x1="55" y1="84" x2="55" y2="92" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="65" y1="82" x2="65" y2="90" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="75" y1="80" x2="75" y2="88" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="125" y1="80" x2="125" y2="88" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="135" y1="82" x2="135" y2="90" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="145" y1="84" x2="145" y2="92" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Structured Shoulder</text>
</svg>