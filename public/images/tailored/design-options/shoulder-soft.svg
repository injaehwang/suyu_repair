<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Torso/neck -->
  <rect x="85" y="55" width="30" height="30" rx="5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Soft shoulder - rounded, slightly drooped -->
  <path d="M38 108 Q52 88 85 82 L85 90 Q58 94 46 108 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <path d="M162 108 Q148 88 115 82 L115 90 Q142 94 154 108 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Body -->
  <path d="M46 108 L46 160 L154 160 L154 108" fill="none" stroke="#475569" stroke-width="2"/>
  <!-- Shoulder line - very rounded/soft -->
  <path d="M38 108 Q58 86 100 82 Q142 86 162 108" fill="none" stroke="#475569" stroke-width="2.5"/>
  <!-- Soft/round indicator -->
  <path d="M50 95 C65 82 85 78 100 78 C115 78 135 82 150 95" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- "soft" wave lines on shoulder -->
  <path d="M55 96 Q60 93 65 96 Q70 99 75 96" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M125 96 Q130 93 135 96 Q140 99 145 96" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Soft Shoulder</text>
</svg>