  <circle cx="87" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="87" cy="120" r="1.5" fill="#475569"/>
  <circle cx="113" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="113" cy="120" r="1.5" fill="#475569"/>
  <circle cx="138" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="138" cy="120" r="1.5" fill="#475569"/>
