<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Sleeve cuff area zoomed in -->
  <path d="M40 25 L160 25 L165 140 L35 140 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cuff line -->
  <line x1="40" y1="105" x2="160" y2="105" stroke="#475569" stroke-width="1.5"/>
  <!-- Functional buttons with visible buttonholes -->
  <circle cx="65" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="65" cy="120" r="1.5" fill="#475569"/>
  <!-- Buttonhole -->
  <line x1="55" y1="112" x2="55" y2="128" stroke="#475569" stroke-width="1.5"/>
  <circle cx="88" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="88" cy="120" r="1.5" fill="#475569"/>
  <line x1="78" y1="112" x2="78" y2="128" stroke="#475569" stroke-width="1.5"/>
  <circle cx="111" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="111" cy="120" r="1.5" fill="#475569"/>
  <line x1="101" y1="112" x2="101" y2="128" stroke="#475569" stroke-width="1.5"/>
  <circle cx="134" cy="120" r="5" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="134" cy="120" r="1.5" fill="#475569"/>
  <line x1="124" y1="112" x2="124" y2="128" stroke="#475569" stroke-width="1.5"/>
  <!-- One button shown unbuttoned/open for emphasis -->
  <path d="M82 55 Q100 45 118 55 L115 75 Q100 70 85 75 Z" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Arrow showing it opens -->
  <path d="M100 62 L100 48" stroke="#475569" stroke-width="1.5"/>
  <path d="M95 53 L100 48 L105 53" fill="none" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Functional</text>
</svg>