  <line x1="65" y1="30" x2="55" y2="158" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="135" y1="30" x2="145" y2="158" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
