<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket opened showing interior -->
  <path d="M30 30 L70 20 L100 18 L130 20 L170 30 L172 65 L174 165 L26 165 L28 65 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Lining area - full coverage -->
  <rect x="38" y="38" width="124" height="120" rx="3" fill="#e2e8f0" stroke="#475569" stroke-width="1" stroke-dasharray="0"/>
  <!-- Diagonal pattern to indicate lining fabric -->
  <g stroke="#cbd5e1" stroke-width="0.8" opacity="0.8">
    <line x1="38" y1="50" x2="50" y2="38"/>
    <line x1="38" y1="70" x2="70" y2="38"/>
    <line x1="38" y1="90" x2="90" y2="38"/>
    <line x1="38" y1="110" x2="110" y2="38"/>
    <line x1="38" y1="130" x2="130" y2="38"/>
    <line x1="38" y1="150" x2="150" y2="38"/>
    <line x1="50" y1="158" x2="162" y2="46"/>
    <line x1="70" y1="158" x2="162" y2="66"/>
    <line x1="90" y1="158" x2="162" y2="86"/>
    <line x1="110" y1="158" x2="162" y2="106"/>
    <line x1="130" y1="158" x2="162" y2="126"/>
    <line x1="150" y1="158" x2="162" y2="146"/>
  </g>
  <!-- "FULL" text -->
  <text x="100" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#475569" opacity="0.5">FULL</text>
  <!-- Label -->
  <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Full Lining</text>
</svg>