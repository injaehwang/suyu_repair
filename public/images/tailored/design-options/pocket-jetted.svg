<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="12" fill="#f1f5f9"/>
  <!-- Jacket side panel hint -->
  <rect x="40" y="30" width="120" height="130" rx="4" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Jetted/welt pocket - two thin welts with slit -->
  <!-- Upper welt -->
  <rect x="60" y="88" width="80" height="5" rx="1" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <!-- Slit line -->
  <line x1="60" y1="93" x2="140" y2="93" stroke="#475569" stroke-width="2"/>
  <!-- Lower welt -->
  <rect x="60" y="93" width="80" height="5" rx="1" fill="#e2e8f0" stroke="#475569" stroke-width="1.5"/>
  <!-- Pocket depth hint -->
  <path d="M60 98 L60 115 Q60 120 65 120 L135 120 Q140 120 140 115 L140 98" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Jetted Pocket</text>
</svg>